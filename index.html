<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Task Picker</title>
    <!-- Unpack the JS Confetti Library -->
    <script src="https://unpkg.com/js-confetti@latest/dist/js-confetti.browser.js"></script>
    
    <!-- Load the app -->
    <script src="app.js" defer></script>
</head>
<body>
  <h1>Today's Task</h1>
  <div id="todayTask"></div>

  <h2>Edit Tasks</h2>
  <ul id="taskList"></ul>

  <input type="text" id="newTask" placeholder="Add new task" />
  <button id="addTaskBtn">Add</button>

  <img id="reward-img1" src="feed-the-horse1.png" style="display: none;" />
  <img id="reward-img2" src="feed-the-horse2.png" style="display: none;" />
  <img id="reward-img3" src="feed-the-horse3.png" style="display: none;" />
  <h3 id="scoreMessage"></h3>

  <p>Score: <span id="scoreDisplay">0</span></p>

  <footer><p>Gigi gogo version 1.0.0 --- speedy-sasquatch-code </p></footer>
  
</body>
</html>
