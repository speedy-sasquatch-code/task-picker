<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Task Picker</title>
    <!-- 1. FIRST: Load the JS Confetti Library from the CDN -->
    <script src="https://cdn.jsdelivr.net/npm/js-confetti@latest/dist/js-confetti.browser.js"></script>
    
    <!-- 2. SECOND: Load your own JavaScript file (app.js) -->
    <script src="app.js" defer></script>
</head>
<body>
  <h1>Today's Task</h1>
  <div id="todayTask"></div>

  <h2>Edit Tasks</h2>
  <ul id="taskList"></ul>

  <input type="text" id="newTask" placeholder="Add new task" />
  <button onclick="addTask()">Add</button>

  <img id="reward-img" src="feed-the-horse1.png" style="display: none;" />
  <img id="reward-img" src="feed-the-horse2.png" style="display: none;" />
  <img id="reward-img" src="feed-the-horse3.png" style="display: none;" />

  <footer><p>Gigi gogo version 1.0.0 --- speedy-sasquatch-code </p></footer>
  
</body>
</html>
